  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

behavior: smooth; background: var(--bg); }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-weight: 400;\n  line-height: 1.55;\n  overflow-x: hidden;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nimg, svg { display: block; max-width: 100%; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }\n::selection { background: var(--accent); color: #fff; }\n\n/* Grain overlay */\nbody::after {\n  content: \"\";\n  position: fixed; inset: 0;\n  pointer-events: none;\n  z-index: 200;\n  opacity: 0.05;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\");\n  mix-blend-mode: overlay;\n}\n\n/* =========================================================\n   LAYOUT\n   ========================================================= */\n.wrap { max-width: 1240px; margin: 0 auto; padding: 0 28px; }\n.wrap-wide { max-width: 1440px; margin: 0 auto; padding: 0 28px; }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n}\n.eyebrow .dot { color: var(--accent); }\n.eyebrow .hash { color: var(--accent); margin-right: 6px; }\n\nh1, h2, h3, h4 { font-family: var(--display); font-weight: 900; letter-spacing: -0.02em; line-height: 0.95; }\n\n.section { padding: 120px 0; position: relative; }\n.section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 40px; margin-bottom: 56px; flex-wrap: wrap; }\n.section-head .num { font-family: var(--mono); color: var(--accent); font-size: 12px; letter-spacing: 0.2em; }\n.section-head h2 { font-size: clamp(48px, 6vw, 84px); text-transform: uppercase; line-height: 0.9; }\n.section-head h2 em { font-style: normal; color: var(--accent); }\n.section-head > div { min-width: 0; }\n\n/* Halftone border divider */\n.halftone-rule {\n  height: 14px;\n  background-image: radial-gradient(circle, var(--accent) 1.2px, transparent 1.6px);\n  background-size: var(--halftone-size) var(--halftone-size);\n  opacity: var(--halftone-opacity);\n}\n\n/* =========================================================\n   TOP MARQUEE / TICKER\n   ========================================================= */\n.ticker {\n  position: sticky; top: 0; z-index: 90;\n  background: var(--accent);\n  color: #fff;\n  border-bottom: 1px solid #000;\n  overflow: hidden;\n  height: 30px;\n  display: flex;\n  align-items: center;\n}\n.ticker-track {\n  display: flex; gap: 40px;\n  white-space: nowrap;\n  animation: ticker 42s linear infinite;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  padding-left: 40px;\n}\n.ticker-track span { display: inline-flex; align-items: center; gap: 12px; }\n.ticker-track span::after { content: \"●\"; color: rgba(255,255,255,0.5); }\n@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n/* =========================================================\n   NAV\n   ========================================================= */\nnav.nav {\n  position: sticky; top: 30px; z-index: 80;\n  background: rgba(10,10,10,0.78);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid var(--line);\n}\n.nav-inner {\n  display: flex; align-items: center; justify-content: space-between;\n  height: 64px;\n}\n.brand {\n  display: flex; align-items: center; gap: 12px;\n  font-family: var(--display);\n  font-size: 18px;\n  letter-spacing: -0.02em;\n}\n.brand-mark {\n  width: 28px; height: 28px;\n  border: 1.5px solid var(--ink);\n  border-radius: 50%;\n  position: relative;\n  display: inline-block;\n}\n.brand-mark::before {\n  content: \"\"; position: absolute; inset: 5px;\n  border-radius: 50%; background:\n    repeating-radial-gradient(circle, var(--ink) 0 0.5px, transparent 0.5px 2px);\n  opacity: 0.9;\n}\n.brand-mark::after {\n  content: \"\"; position: absolute;\n  top: 50%; left: 50%; transform: translate(-50%,-50%);\n  width: 4px; height: 4px; border-radius: 50%;\n  background: var(--accent);\n}\n.nav-links { display: flex; gap: 6px; align-items: center; }\n.nav-links a {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n  padding: 8px 14px;\n  transition: color 0.2s;\n}\n.nav-links a:hover { color: var(--ink); }\n.nav-cta {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: #fff;\n  background: var(--accent);\n  padding: 10px 18px;\n  border: 1px solid var(--accent);\n  transition: background 0.2s, color 0.2s;\n}\n.nav-cta:hover { background: var(--ink); color: #000; border-color: var(--ink); }\n\n/* =========================================================\n   HERO\n   ========================================================= */\n.hero {\n  padding: 80px 0 100px;\n  position: relative;\n  overflow: hidden;\n}\n.hero::before {\n  content: \"\";\n  position: absolute;\n  top: -200px; left: 50%; transform: translateX(-50%);\n  width: 1400px; height: 900px;\n  background: radial-gradient(ellipse at center, rgba(204,0,0,0.18) 0%, transparent 60%);\n  pointer-events: none;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  gap: 56px;\n  align-items: center;\n  position: relative;\n  z-index: 2;\n}\n.hero-eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 28px;\n}\n.hero- splay: flex; gap: 40px; flex-wrap: wrap;\n}\n.hero-meta > div { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dimmer); }\n.hero-meta strong { color: var(--ink); display: block; font-family: var(--display); font-size: 28px; letter-spacing: -0.02em; margin-bottom: 4px; text-transform: none; }\n\n/* Scan demo visual (right side) */\n.scan {\n  position: relative;\n  aspect-ratio: 1 / 1.05;\n  background: var(--bg-2);\n  border: 1px solid var(--line);\n  overflow: hidden;\n}\n.scan::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image: radial-gradient(circle at 15% 15%, rgba(255,255,255,0.04), transparent 50%);\n  pointer-events: none;\n}\n/* Corner brackets */\n.scan-corner {\n  position: absolute; width: 24px; height: 24px;\n  border: 2px solid var(--accent);\n}\n.scan-corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }\n.scan-corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }\n.scan-corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }\n.scan-corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }\n\n.scan-sleeve {\n  position: absolute;\n  top: 70px; left: 70px; right: 70px; bottom: 150px;\n  background: linear-gradient(135deg, #2b1a14 0%, #1a0d0a 60%, #0a0504 100%);\n  box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);\n  display: flex; flex-direction: column; justify-content: space-between;\n  padding: 28px;\n  overflow: hidden;\n}\n.scan-sleeve::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background: radial-gradient(circle at 30% 30%, rgba(232,163,61,0.15) 0%, transparent 55%);\n}\n.scan-sleeve::after {\n  /* halftone texture on sleeve */\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image: radial-gradient(circle, rgba(255,255,255,0.12) 0.8px, transparent 1px);\n  background-size: 4px 4px;\n  mix-blend-mode: overlay;\n  opacity: 0.5;\n}\n.scan-sleeve-mark {\n  font-family: var(--display);\n  font-size: 48px;\n  line-height: 0.9;\n  color: #f2e7d4;\n  text-transform: uppercase;\n  letter-spacing: -0.02em;\n  position: relative; z-index: 2;\n}\n.scan-sleeve-mark span { color: var(--accent); display: block; }\n.scan-sleeve-foot {\n  display: flex; justify-content: space-between; align-items: flex-end;\n  position: relative; z-index: 2;\n  font-family: var(--mono);\n  font-size: 10px;\n  color: rgba(242,231,212,0.6);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n}\n.scan-vinyl {\n  position: absolute;\n  right: -60px; bottom: 20px;\n  width: 220px; height: 220px;\n  border-radius: 50%;\n  background:\n    repeating-radial-gradient(circle, #000 0 1px, #1a1a1a 1px 2.5px),\n    radial-gradient(circle, #222 0 42%, transparent 42%);\n  box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);\n  animation: spinSlow 22s linear infinite;\n  z-index: 0;\n}\n.scan-vinyl::before {\n  content: \"\"; position: absolute;\n  top: 50%; left: 50%; transform: translate(-50%,-50%);\n  width: 80px; height: 80px; border-radius: 50%;\n  background: var(--accent);\n  box-shadow: 0 0 0 1px rgba(0,0,0,0.4);\n}\n.scan-vinyl::after {\n  content: \"\"; position: absolute;\n  top: 50%; left: 50%; transform: translate(-50%,-50%);\n  width: 6px; height: 6px; border-radius: 50%;\n  background: #000;\n}\n@keyframes spinSlow { to { transform: rotate(360deg); } }\n\n/* Scanning line */\n.scan-line {\n  position: absolute;\n  left: 70px; right: 70px;\n  height: 2px;\n  background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent);\n  box-shadow: 0 0 16px var(--accent);\n  animation: scanLine 3.2s ease-in-out infinite;\n  z-index: 3;\n}\n@keyframes scanLine {\n  0%   { top: 70px; opacity: 0; }\n  10%  { opacity: 1; }\n  50%  { top: calc(100% - 150px); opacity: 1; }\n  60%  { opacity: 0; }\n  100% { top: 70px; opacity: 0; }\n}\n\n/* Readout panel */\n.scan-readout {\n  position: absolute;\n  left: 20px; right: 20px; bottom: 20px;\n  height: 110px;\n  background: #000;\n  border: 1px solid var(--line-2);\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  padding: 16px 18px;\n  gap: 18px;\n}\n.scan-readout .status {\n  display: flex; align-items: center; gap: 8px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--accent);\n}\n.scan-readout .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1s step-end infinite; }\n@keyframes blink { 50% { opacity: 0.2; } }\n.scan-readout .meta {\n  font-family: var(--mono); font-size: 10px; color: var(--ink-dim);\n  letter-spacing: 0.1em; text-transform: uppercase;\n  line-height: 1.5;\n}\n.scan-readout .meta b { color: var(--ink); font-weight: 600; display: block; font-family: var(--sans); font-size: 15px; text-transform: none; letter-spacing: -0.01em; margin-bottom: 2px; }\n.scan-readout .confidence { text-align: right; }\n.scan-readout .confidence b {\n  font-family: var(--display); font-size: 22px; color: var(--accent); display: block;\n}\n.scan-readout .confidence span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-dim); text-transform: uppercase; }\n\n/* Floating tag chips */\n.scan-chip {\n  position: absolute;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  background: #000;\n  border: 1px solid var(--accent);\n  color: var(--accent);\n  padding: 6px 10px;\n  z-index: 4;\n  animation: fadeInChip 0.6s ease-out both;\n}\n.scan-chip.c1 { top: 40px; right: 40px; animation-delay: 0.6s; }\n.scan-chip.c2 { top: 95px; right: 80px; animation-delay: 1.1s; color: var(--ink); border-color: var(--line-2); }\n.scan-chip.c3 { top: 150px; right: 30px; animation-delay: 1.6s; color: var(--ink); border-color: var(--line-2); }\n@keyframes fadeInChip { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }\n\n/* =========================================================\n   PROBLEM SECTION\n   ========================================================= */\n.problem {\n  padding: 100px 0;\n  background: var(--bg-1);\n  border-top: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n}\n.problem-top { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; margin-bottom: 70px; align-items: end; }\n.problem-top h2 { font-size: clamp(42px, 5.5vw, 76px); text-transform: uppercase; line-height: 0.9; }\n.problem-top h2 em { font-style: normal; color: var(--accent); }\n.problem-top p { color: var(--ink-dim); font-size: 18px; max-width: 520px; }\n\n.pain-grid {\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;\n  border-top: 1px solid var(--line);\n}\n.pain {\n  border-right: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n  padding: 36px 32px 40px;\n  position: relative;\n  transition: background 0.3s;\n}\n.pain:last-child { border-right: none; }\n.pain:hover { background: rgba(204,0,0,0.04); }\n.pain-num {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  color: var(--accent);\n  margin-bottom: 20px;\n}\n.pain h3 { font-family: var(--sans); font-weight: 800; font-size: 22px; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 14px; text-transform: none; }\n.pain p { color: var(--ink-dim); font-size: 15px; }\n\n/* =========================================================\n   HOW IT WORKS — device mocks\n   ========================================================= */\n.how { padding: 130px 0; }\n.how-head h2 { font-size: clamp(48px, 6vw, 88px); text-transform: uppercase; }\n.how-head h2 em { font-style: normal; color: var(--accent); }\n.how-head p { color: var(--ink-dim); max-width: 540px; font-size: 17px; margin-top: 16px; }\n\n.how-grid {\n  display: grid;\n  grid-template-colu nsparent 55%),\n    var(--bg);\n  overflow: hidden;\n  border-top: 1px solid var(--line);\n}\n.final::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image: radial-gradient(circle, var(--accent) 1px, transparent 1.4px);\n  background-size: 14px 14px;\n  opacity: 0.12;\n  pointer-events: none;\n}\n.final h2 {\n  font-size: clamp(56px, 10vw, 160px);\n  line-height: 0.88;\n  letter-spacing: -0.04em;\n  text-transform: uppercase;\n  position: relative;\n}\n.final h2 .accent { color: var(--accent); }\n.final p { color: var(--ink-dim); font-size: 18px; margin-top: 24px; }\n\n.final-form {\n  margin: 48px auto 0;\n  max-width: 560px;\n  display: grid;\n  grid-template-columns: 1fr auto;\n  border: 1px solid var(--line-2);\n  background: rgba(0,0,0,0.6);\n  position: relative;\n}\n.final-form input {\n  border: none; background: transparent; outline: none;\n  padding: 20px 22px;\n  font-family: var(--mono); font-size: 13px;\n  color: var(--ink);\n  letter-spacing: 0.04em;\n}\n.final-form input::placeholder { color: var(--ink-dimmer); }\n.final-form button {\n  padding: 20px 28px;\n  background: var(--accent); color: #fff;\n  font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;\n  border-left: 1px solid #000;\n  transition: all 0.2s;\n}\n.final-form button:hover { background: var(--ink); color: #000; }\n.final-note {\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-dimmer); text-transform: uppercase;\n  margin-top: 18px;\n}\n\n/* =========================================================\n   FOOTER\n   ========================================================= */\nfooter {\n  padding: 60px 0 40px;\n  background: var(--bg);\n  border-top: 1px solid var(--line);\n  position: relative; z-index: 2;\n}\nfooter .foot-top {\n  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;\n  margin-bottom: 60px;\n}\nfooter h4 {\n  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim);\n  margin-bottom: 18px;\n}\nfooter ul { list-style: none; }\nfooter li { padding: 6px 0; font-size: 14px; color: var(--ink-dim); }\nfooter li a:hover { color: var(--ink); }\nfooter .foot-brand { font-family: var(--display); font-size: 32px; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 16px; }\nfooter .foot-brand em { font-style: normal; color: var(--accent); }\nfooter .foot-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: var(--ink-dim); text-transform: uppercase; max-width: 320px; line-height: 1.8; }\n.foot-bottom {\n  padding-top: 30px;\n  border-top: 1px solid var(--line);\n  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px;\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-dimmer);\n}\n\n/* =========================================================\n   TWEAKS PANEL\n   ========================================================= */\n.tweaks {\n  position: fixed;\n  right: 20px; bottom: 20px;\n  width: 280px;\n  background: #000;\n  border: 1px solid var(--line-2);\n  padding: 18px 18px 16px;\n  z-index: 500;\n  display: none;\n  font-family: var(--mono); font-size: 11px; color: var(--ink);\n}\n.tweaks.on { display: block; }\n.tweaks h5 {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);\n  margin-bottom: 14px;\n  display: flex; justify-content: space-between; align-items: center;\n}\n.tweaks h5 .close { cursor: pointer; color: var(--ink-dim); font-size: 14px; }\n.tweak-row { margin-bottom: 14px; }\n.tweak-row .lbl { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-dim); text-transform: uppercase; margin-bottom: 8px; }\n.swatches { display: flex; gap: 8px; }\n.swatches button {\n  width: 32px; height: 32px; border: 1px solid var(--line-2);\n  padding: numbers respected<\u002Fspan><span>For people who know what a runout groove is<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- NAV -->\n<nav class=\"nav\">\n  <div class=\"wrap nav-inner\">\n    <a href=\"#top\" class=\"brand\">\n      <span class=\"brand-mark\"><\u002Fspan>\n      VinylGrinder\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#problem\">Problem<\u002Fa>\n      <a href=\"#how\">How it works<\u002Fa>\n      <a href=\"#features\">Features<\u002Fa>\n      <a href=\"#who\">Who it's for<\u002Fa>\n      <a href=\"#pricing\">Pricing<\u002Fa>\n      <a href=\"#faq\">FAQ<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"#final\" class=\"nav-cta\">Join waitlist<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"top\">\n  <div class=\"wrap hero-grid\">\n    <div>\n      <div class=\"hero-eyebrow\">\n        <span class=\"pulse\"><\u002Fspan>\n        Private Beta · Q3 2026\n      <\u002Fdiv>\n      <h1>\n        Stop<br>\n        <span class=\"strike\">typing.<\u002Fspan><br>\n        Start <span class=\"accent\">grinding.<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"hero-sub\">\n        The fastest way to catalogue your vinyl — and list it for sale.\n        <strong>Snap the sleeve.<\u002Fstrong> We match it against Discogs and push an SEO-optimised listing to eBay and Shopify in one tap.\n      <\u002Fp>\n      <div class=\"hero-ctas\">\n        <a href=\"#final\" class=\"btn btn-primary\">Get early access <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <a href=\"#how\" class=\"btn btn-ghost\">See it work<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-meta\">\n        <div><strong>~6s<\u002Fstrong>avg scan → listing<\u002Fdiv>\n        <div><strong>2<\u002Fstrong>channels, one click<\u002Fdiv>\n        <div><strong>60M+<\u002Fstrong>Discogs releases indexed<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Scanning demo -->\n    <div class=\"scan\" role=\"img\" aria-label=\"Photo recognition demo\">\n      <div class=\"scan-corner tl\"><\u002Fdiv>\n      <div class=\"scan-corner tr\"><\u002Fdiv>\n      <div class=\"scan-corner bl\"><\u002Fdiv>\n      <div class=\"scan-corner br\"><\u002Fdiv>\n\n      <div class=\"scan-vinyl\"><\u002Fdiv>\n      <div class=\"scan-sleeve\">\n        <div class=\"scan-sleeve-mark\">Crate<span>Burn<\u002Fspan><\u002Fdiv>\n        <div class=\"scan-sleeve-foot\">\n          <span>LP · 180g<\u002Fspan>\n          <span>A1 — B4<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scan-line\"><\u002Fdiv>\n\n      <div class=\"scan-chip c1\">Matched<\u002Fdiv>\n      <div class=\"scan-chip c2\">CATLG: CB-004<\u002Fdiv>\n      <div class=\"scan-chip c3\">UK · 1979 · 1st press<\u002Fdiv>\n\n      <div class=\"scan-readout\">\n        <div class=\"status\"><span class=\"dot\"><\u002Fspan>ID · OK<\u002Fdiv>\n        <div class=\"meta\">\n          <b>Crate Burn — Final Revolution<\u002Fb>\n          Apex Records · UK · 1979 · 1st press\n        <\u002Fdiv>\n        <div class=\"confidence\">\n          <b>97%<\u002Fb>\n          <span>Confidence<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"halftone-rule\"><\u002Fdiv>\n\n<!-- PROBLEM -->\n<section class=\"problem\" id=\"problem\">\n  <div class=\"wrap\">\n    <div class=\"problem-top\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>01 — The Problem<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">Listing records<br><em>sucks.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p>\n        You know the drill. Pull the sleeve. Type the title. Copy the catalog number off the spine. Cross-reference Discogs. Write a description. Re-write it for eBay. Re-write it again for Shopify. Photograph it five times. Screw up the matrix number. Repeat. Four hundred times.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pain-grid\">\n      <div class=\"pain\">\n        <div class=\"pain-num\">01 / Manual entry<\u002Fdiv>\n        <h3>You're a human OCR machine.<\u002Fh3>\n        <p>Typing titles, artists, labels, catalog numbers and pressing details by hand. For every record. Errors compound. Listings get rejected.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <div class=\"pain-num\">02 / Cross-platform chaos<\u002Fdiv>\n        <h3>Different rules on every channel.<\u002Fh3>\n        <p>eBay wants keyword-stuffed titles. Shopify wants clean product pages. Discogs wants strict formatting. You're writing the same record three times.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <div class=\"pain-num\">03 / Bad titles = no sales<\u002Fdiv>\n        <h3>SEO you don't have time for.<\u002Fh3>\n        <p>Missing pressing year. Missing country. Missing \"first press\" or \"promo\" or \"reissue.\" Buyers searching for the right pressing never find yours.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section class=\"how\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>02 — Workflow<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">Three steps.<br>Shelf <em>to storefront.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"color: var(--ink-dim); font-size: 16px; max-width: 400px;\">Photo recognition does the heavy lifting. Discogs fills in the blanks. Publishing is one tap on each channel.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"how-grid\">\n      <!-- STEP 1 -->\n      <div class=\"step-card\">\n        <div class=\"step-card-head\">\n          <span class=\"n\">STEP 01<\u002Fspan>\n          <span class=\"k\">Camera · Live<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-mock m1\">\n          <div class=\"viewfinder\">\n            <div class=\"vf-corner tl\"><\u002Fdiv>\n            <div class=\"vf-corner tr\"><\u002Fdiv>\n            <div class=\"vf-corner bl\"><\u002Fdiv>\n            <div class=\"vf-corner br\"><\u002Fdiv>\n            <div class=\"vf-sleeve\"><\u002Fdiv>\n            <div class=\"vf-scanline\"><\u002Fdiv>\n            <div class=\"vf-label\">CAPTURE · 01 / 03<\u002Fdiv>\n            <div class=\"vf-shutter\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>Snap the sleeve.<\u002Fh3>\n          <p>Point, shoot. Our recognition engine reads the cover, spine, label — even matrix numbers etched on the runout. No typing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 2 -->\n      <div class=\"step-card\">\n        <div class=\"step-card-head\">\n          <span class=\"n\">STEP 02<\u002Fspan>\n          <span class=\"k\">Discogs · Match<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-mock m2\">\n          <div class=\"m2-header\"><span>Matches <b>· 4<\u002Fb><\u002Fspan><span>Confidence<\u002Fspan><\u002Fdiv>\n          <div class=\"m2-row\">\n            <div class=\"m2-thumb alt1\"><\u002Fdiv>\n            <div class=\"m2-meta\"><b>Final Revolution — 1979 UK Press<\u002Fb>Apex · APX-4004 · 180g<\u002Fdiv>\n            <div class=\"m2-pct\">94%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m2-row\">\n            <div class=\"m2-thumb alt2\"><\u002Fdiv>\n            <div class=\"m2-meta\"><b>Final Revolution — 1981 Reissue<\u002Fb>Apex · APX-4004R · Black<\u002Fdiv>\n            <div class=\"m2-pct\">71%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m2-row\">\n            <div class=\"m2-thumb alt3\"><\u002Fdiv>\n            <div class=\"m2-meta\"><b>Final Revolution — Remastered 2012<\u002Fb>Apex · APX-2012-RM<\u002Fdiv>\n            <div class=\"m2-pct\">58%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m2-row\">\n            <div class=\"m2-thumb\"><\u002Fdiv>\n            <div class=\"m2-meta\"><b>Crate Burn — Final Revolution<\u002Fb>Apex · CB-004 · UK 1st · 1979<\u002Fdiv>\n            <div class=\"m2-pct\">97% <span class=\"m2-check\">✓<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>Enrich from Discogs.<\u002Fh3>\n          <p>We match the photo to the exact pressing. Tracklist, catalog number, year, country, label — pulled in, verified, ready.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 3 -->\n      <div class=\"step-card\">\n        <div class=\"step-card-head\">\n          <span class=\"n\">STEP 03<\u002Fspan>\n          <span class=\"k\">Publish · 2 channels<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-mock m3\">\n          <div class=\"m3-title\">Channels <b>ACTIVE<\u002Fb><\u002Fdiv>\n          <div class=\"m3-channels\">\n            <div class=\"m3-chan ebay\">\n              <div class=\"logo\">e<\u002Fdiv>\n              <div class=\"name\">eBay <small>Optimised title · 80 chars<\u002Fsmall><\u002Fdiv>\n              <div class=\"toggle\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"m3-chan shopify\">\n              <div class=\"logo\">S<\u002Fdiv>\n              <div class=\"name\">Shopify <small>Long-form product copy<\u002Fsmall><\u002Fdiv>\n              <div class=\"toggle\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"m3-chan off\">\n              <div class=\"logo\" style=\"background: #222; color: var(--ink-dim);\">D<\u002Fdiv>\n              <div class=\"name\" style=\"color: var(--ink-dim);\">Discogs <small>Marketplace · coming<\u002Fsmall><\u002Fdiv>\n              <div class=\"toggle\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m3-publish\">Publish to 2 channels →<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>Ship it.<\u002Fh3>\n          <p>Platform-optimised titles and descriptions, generated and posted. One tap puts the record on eBay and Shopify at the same time.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section class=\"features\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>03 — The toolkit<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">Built for collectors<br>who <em>mean business.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"features-grid\">\n      <!-- HERO FEATURE -->\n      <div class=\"feat feat-hero\">\n        <div class=\"feat-tag\">Signature feature<\u002Fdiv>\n        <h3>Photo recognition that actually knows vinyl.<\u002Fh3>\n        <p>Trained on sleeves, labels, matrix numbers and runout etchings. It tells a 1979 UK first press from a 1981 reissue — because that's the difference between £20 and £200.<\u002Fp>\n        <div class=\"feat-visual\">\n          <div class=\"crosshair\"><\u002Fdiv>\n          <div class=\"bigrecord\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SMALL FEATURE 1 -->\n      <div class=\"feat feat-small\">\n        <div class=\"feat-tag\">Multi-channel<\u002Fdiv>\n        <h3>eBay + Shopify, in parallel.<\u002Fh3>\n        <p>Keyword-stuffed eBay titles for search. Long-form product pages for Shopify. Different copy per channel, generated from the same record.<\u002Fp>\n        <div class=\"feat-pub-channels\">\n          <div class=\"c\"><b>eBay<\u002Fb>Listing live<\u002Fdiv>\n          <div class=\"c\"><b>Shopify<\u002Fb>Draft + publish<\u002Fdiv>\n          <div class=\"c\"><b>Discogs<\u002Fb>Soon<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SMALL FEATURE 2 -->\n      <div class=\"feat feat-small\">\n        <div class=\"feat-tag\">Collection<\u002Fdiv>\n        <h3>Your crate, digitised.<\u002Fh3>\n        <p>Search, sort, filter by pressing, year, country, condition, value. Track what you own, what's listed, what sold. One source of truth for the whole shelf.<\u002Fp>\n        <div class=\"mini-chart\" aria-hidden=\"true\">\n          <span style=\"height: 40%\"><\u002Fspan>\n          <span style=\"height: 65%\"><\u002Fspan>\n          <span style=\"height: 50%\"><\u002Fspan>\n          <span style=\"height: 80%\"><\u002Fspan>\n          <span style=\"height: 95%\"><\u002Fspan>\n          <span style=\"height: 70%\"><\u002Fspan>\n          <span style=\"height: 85%\"><\u002Fspan>\n          <span style=\"height: 100%\"><\u002Fspan>\n          <span style=\"height: 75%\"><\u002Fspan>\n          <span style=\"height: 90%\"><\u002Fspan>\n          <span style=\"height: 60%\"><\u002Fspan>\n          <span style=\"height: 88%\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHO IT'S FOR -->\n<section class=\"who\" id=\"who\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>04 — Who it's for<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">For crate-diggers<br><em>and crate-movers.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tiers\">\n      <div class=\"tier\">\n        <div class=\"tier-no\">TIER 01 — Free<\u002Fdiv>\n        <div class=\"tier-persona\">The<br><em>Collector<\u002Fem><\u002Fdiv>\n        <div class=\"tier-size\">50 — 300 records<\u002Fdiv>\n        <p class=\"tier-desc\">You've got a couple of crates. You want to know what you own. Maybe flip the odd duplicate. You care that your catalogue is correct — because you are.<\u002Fp>\n        <div class=\"tier-quote\">\"I want to know exactly what's on my shelf, without spending a weekend typing it in.\"<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tier\">\n        <div class=\"tier-no\">TIER 02 — Pro<\u002Fdiv>\n        <div class=\"tier-persona\">The<br><em>Flipper<\u002Fem><\u002Fdiv>\n        <div class=\"tier-size\">500 — 3,000+ records<\u002Fdiv>\n        <p class=\"tier-desc\">You trade weekly. You've written the same description four hundred times. Listings are your job, not your hobby — and they're eating your evenings.<\u002Fp>\n        <div class=\"tier-quote\">\"If I could cut listing time in half, I could list twice as much. That's the whole game.\"<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tier\">\n        <div class=\"tier-no\">TIER 03 — Dealer<\u002Fdiv>\n        <div class=\"tier-persona\">The<br><em>Store<\u002Fem><\u002Fdiv>\n        <div class=\"tier-size\">1,000s · multi-channel<\u002Fdiv>\n        <p class=\"tier-desc\">You run a store. Maybe a team. Inventory on eBay, on Shopify, in the bricks-and-mortar. You need one source of truth and fast, consistent listings at scale.<\u002Fp>\n        <div class=\"tier-quote\">\"I don't need another app. I need the listing queue to clear itself while I'm unpacking the next box.\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRICING -->\n<section class=\"pricing\" id=\"pricing\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>05 — Pricing<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">Pick your <em>tier.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"color: var(--ink-dim); font-size: 14px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; max-width: 360px;\">Final prices at launch. Early adopters lock in the lowest tier forever.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"plans\">\n      <div class=\"plan\">\n        <div class=\"plan-head\"><span class=\"plan-tag\">Free<\u002Fspan><span>Tier 01<\u002Fspan><\u002Fdiv>\n        <div class=\"plan-name\">Collector<\u002Fdiv>\n        <p class=\"plan-desc\">For casual collectors who want a clean digital catalogue.<\u002Fp>\n        <div class=\"plan-price\"><span class=\"cur\">$<\u002Fspan>0<\u002Fdiv>\n        <div class=\"plan-price-note\">Forever · No card required<\u002Fdiv>\n        <ul>\n          <li>Up to 300 records<\u002Fli>\n          <li>3 photos per record<\u002Fli>\n          <li>Photo recognition<\u002Fli>\n          <li>Discogs enrichment<\u002Fli>\n          <li class=\"off\">eBay + Shopify publishing<\u002Fli>\n          <li class=\"off\">Auto-generated listings<\u002Fli>\n        <\u002Ful>\n        <a href=\"#final\" class=\"plan-cta\">Start free<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"plan pro\">\n        <div class=\"plan-head\"><span class=\"plan-tag\">Pro<\u002Fspan><span>Tier 02<\u002Fspan><\u002Fdiv>\n        <div class=\"plan-name\">Flipper<\u002Fdiv>\n        <p class=\"plan-desc\">For serious collectors who sell — weekly, or more.<\u002Fp>\n        <div class=\"plan-price\"><span class=\"cur\">$<\u002Fspan>14<span class=\"per\">/ mo<\u002Fspan><\u002Fdiv>\n        <div class=\"plan-price-note\">Placeholder · Early access pricing<\u002Fdiv>\n        <ul>\n          <li>Unlimited records<\u002Fli>\n          <li>6 photos per record<\u002Fli>\n          <li>Priority photo recognition<\u002Fli>\n          <li>eBay + Shopify publishing<\u002Fli>\n          <li>Auto-generated listings per channel<\u002Fli>\n          <li>Price history + sold comps<\u002Fli>\n        <\u002Ful>\n        <a href=\"#final\" class=\"plan-cta\">Join Pro waitlist<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"plan\">\n        <div class=\"plan-head\"><span class=\"plan-tag\">Dealer<\u002Fspan><span>Tier 03<\u002Fspan><\u002Fdiv>\n        <div class=\"plan-name\">Store<\u002Fdiv>\n        <p class=\"plan-desc\">For dealers and record stores running multi-channel inventory.<\u002Fp>\n        <div class=\"plan-price\"><span class=\"cur\">$<\u002Fspan>49<span class=\"per\">/ mo<\u002Fspan><\u002Fdiv>\n        <div class=\"plan-price-note\">Placeholder · Team pricing at launch<\u002Fdiv>\n        <ul>\n          <li>Unlimited records<\u002Fli>\n          <li>10 photos per record<\u002Fli>\n          <li>Batch capture + recognition<\u002Fli>\n          <li>Multi-store publishing<\u002Fli>\n          <li>Team seats<\u002Fli>\n          <li>API + priority support<\u002Fli>\n        <\u002Ful>\n        <a href=\"#final\" class=\"plan-cta\">Talk to us<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"faq\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"hash\">#<\u002Fspan>06 — FAQ<\u002Fdiv>\n        <h2 style=\"margin-top: 12px;\">Things you'll<br><em>probably ask.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-grid\">\n      <aside>\n        Still got questions?<br>\n        Email <a href=\"mailto:hello@vinylgrinder.app\">hello@vinylgrinder.app<\u002Fa>\n        <br><br>\n        Press + partnerships via the store.\n      <\u002Faside>\n      <div class=\"faq-list\">\n        <details class=\"faq-item\" open=\"\">\n          <summary>How accurate is the photo recognition? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>For common releases with clear sleeve art, match confidence is typically 90%+. For rare, damaged or imported pressings, we surface the top candidates from Discogs and you confirm in a tap. It's faster than typing — even in edge cases.<\u002Fp>\n        <\u002Fdetails>\n        <details class=\"faq-item\">\n          <summary>Which channels do you publish to? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>eBay and Shopify at launch, with channel-specific titles and descriptions. Discogs Marketplace is on the roadmap. Reverb support is being scoped with early Pro users.<\u002Fp>\n        <\u002Fdetails>\n        <details class=\"faq-item\">\n          <summary>Do I need a Discogs account? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>No. We use Discogs as a data source — you don't need an account to benefit from enrichment. If you do have one, you can link it to sync your collection and wantlists.<\u002Fp>\n        <\u002Fdetails>\n        <details class=\"faq-item\">\n          <summary>Who owns the data? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>You do. Full CSV and JSON export on every plan, including Free. Your catalogue is your catalogue — VinylGrinder is a tool, not a hostage situation.<\u002Fp>\n        <\u002Fdetails>\n        <details class=\"faq-item\">\n          <summary>Do you grade condition for me? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>No. Condition grading is the dealer's call, always. We surface the Goldmine grade fields for sleeve and media, and auto-fill pressing/pressing-variant data — but you grade the record.<\u002Fp>\n        <\u002Fdetails>\n        <details class=\"faq-item\">\n          <summary>What about 7\"s, 12\"s, 10\"s, box sets? <span class=\"plus\">+<\u002Fspan><\u002Fsummary>\n          <p>All of the above. Box sets and multi-disc releases are handled as a single record with linked media. 78s are on the roadmap after launch.<\u002Fp>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section class=\"final\" id=\"final\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" style=\"color: var(--accent); display: block; margin-bottom: 24px;\">#07 — Last call<\u002Fdiv>\n    <h2>Stop typing.<br><span class=\"accent\">Start grinding.<\u002Fspan><\u002Fh2>\n    <p>Join the waitlist. Early adopters get founder pricing — locked in, forever.<\u002Fp>\n\n    <form class=\"final-form\" onsubmit=\"event.preventDefault(); this.querySelector('button').textContent='On the list ✓';\">\n      <input type=\"email\" placeholder=\"your@email.com\" aria-label=\"Email\" required=\"\">\n      <button type=\"submit\">Join the queue<\u002Fbutton>\n    <\u002Fform>\n    <div class=\"final-note\">No spam · One update when beta opens · Unsubscribe in one click<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-top\">\n      <div>\n        <div class=\"foot-brand\">Vinyl<em>Grinder<\u002Fem><\u002Fdiv>\n        <p class=\"foot-tag\">Catalogue. List. Ship. Tools for people who actually collect records.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h4>Product<\u002Fh4>\n        <ul>\n          <li><a href=\"#how\">How it works<\u002Fa><\u002Fli>\n          <li><a href=\"#features\">Features<\u002Fa><\u002Fli>\n          <li><a href=\"#pricing\">Pricing<\u002Fa><\u002Fli>\n          <li><a href=\"#faq\">FAQ<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4>Parent brand<\u002Fh4>\n        <ul>\n          <li><a href=\"https://vinylgrinder.com\">vinylgrinder.com<\u002Fa><\u002Fli>\n          <li><a href=\"#\">YouTube<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Instagram<\u002Fa><\u002Fli>\n          <li><a href=\"#\">TikTok<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4>Contact<\u002Fh4>\n        <ul>\n          <li><a href=\"mailto:hello@vinylgrinder.app\">hello@vinylgrinder.app<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Press kit<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Become a partner<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>© 2026 VinylGrinder · All rights reserved<\u002Fspan>\n      <span>Made in the crate<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h5>Tweaks <span class=\"close\" onclick=\"document.getElementById('tweaks').classList.remove('on')\">×<\u002Fspan><\u002Fh5>\n\n  <div class=\"tweak-row\">\n    <div class=\"lbl\">Accent<\u002Fdiv>\n    <div class=\"swatches\" data-group=\"accent\">\n      <button data-val=\"#cc0000\" style=\"background:#cc0000\" class=\"active\" title=\"Blood red\"><\u002Fbutton>\n      <button data-val=\"#e8a33d\" style=\"background:#e8a33d\" title=\"Amber\"><\u002Fbutton>\n      <button data-val=\"#f2f0ec\" style=\"background:#f2f0ec\" title=\"Bone white\"><\u002Fbutton>\n      <button data-val=\"#7a0000\" style=\"background:#7a0000\" title=\"Deep red\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"lbl\">Hero headline<\u002Fdiv>\n    <div class=\"seg\" data-group=\"headline\">\n      <button data-val=\"grinding\" class=\"active\">Grinding<\u002Fbutton>\n      <button data-val=\"crate\">Crate to cart<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"lbl\">Halftone density<\u002Fdiv>\n    <input type=\"range\" min=\"3\" max=\"14\" value=\"6\" data-tweak=\"halftone\">\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"lbl\">Grit overlay<\u002Fdiv>\n    <div class=\"seg\" data-group=\"grit\">\n      <button data-val=\"on\" class=\"active\">On<\u002Fbutton>\n      <button data-val=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ---------- SMOOTH REVEAL ---------- */\n/* (No heavy IO reveals — keep the page fast and immediate) */\n\n/* ---------- TWEAKS / EDIT MODE ---------- */\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"#cc0000\",\n  \"headline\": \"grinding\",\n  \"halftone\": 5,\n  \"grit\": \"on\"\n}/*EDITMODE-END*/;\n\nlet tweaks = { ...TWEAK_DEFAULTS };\n\nfunction applyTweaks(t) {\n  document.documentElement.style.setProperty('--accent', t.accent);\n  // derive deep accent (darker)\n  document.documentElement.style.setProperty('--halftone-size', t.halftone + 'px');\n  // grit\n  document.body.style.setProperty('--grit-display', t.grit === 'on' ? '1' : '0');\n  document.querySelectorAll('body::after');\n  document.body.style.setProperty('opacity', ''); // noop; we style via class\n  if (t.grit === 'off') document.body.classList.add('no-grit'); else document.body.classList.remove('no-grit');\n\n  // headline variant\n  const h1 = document.querySelector('.hero h1');\n  if (h1) {\n    if (t.headline === 'crate') {\n      h1.innerHTML = 'Crate<br>to<br><span class=\"accent\">cart.<\u002Fspan>';\n    } else {\n      h1.innerHTML = 'Stop<br><span class=\"strike\">typing.<\u002Fspan><br>Start <span class=\"accent\">grinding.<\u002Fspan>';\n    }\n  }\n}\n\n// Grit off style\nconst gritStyle = document.createElement('style');\ngritStyle.textContent = `body.no-grit::after { display: none; }`;\ndocument.head.appendChild(gritStyle);\n\napplyTweaks(tweaks);\n\n// Edit mode protocol\nwindow.addEventListener('message', (e) => {\n  if (!e.data || typeof e.data !== 'object') return;\n  if (e.data.type === '__activate_edit_mode') {\n    document.getElementById('tweaks').classList.add('on');\n  } else if (e.data.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks').classList.remove('on');\n  }\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}\n\nfunction persist() {\n  try {\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');\n  } catch(e) {}\n}\n\n// Wire swatches\ndocument.querySelectorAll('.swatches').forEach(group => {\n  const key = group.dataset.group;\n  group.querySelectorAll('button').forEach(btn => {\n    btn.addEventListener('click', () => {\n      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));\n      btn.classList.add('active');\n      tweaks[key] = btn.dataset.val;\n      applyTweaks(tweaks);\n      persist();\n    });\n  });\n});\n\n// Wire segmented buttons\ndocument.querySelectorAll('.seg').forEach(group => {\n  const key = group.dataset.group;\n  group.querySelectorAll('button').forEach(btn => {\n    btn.addEventListener('click', () => {\n      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));\n      btn.classList.add('active');\n      tweaks[key] = btn.dataset.val;\n      applyTweaks(tweaks);\n      persist();\n    });\n  });\n});\n\n// Wire range\ndocument.querySelectorAll('input[type=range][data-tweak]').forEach(inp => {\n  const key = inp.dataset.tweak;\n  inp.addEventListener('input', () => {\n    tweaks[key] = parseInt(inp.value, 10);\n    applyTweaks(tweaks);\n  });\n  inp.addEventListener('change', persist);\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
